@switch (template) {
  @case ("LIST") {
    <app-expenses-list
      (template)="getTemplate($event)"
    ></app-expenses-list>
  }
  @case ("NEW") {
    <app-expenses-new
      (template)="getTemplate($event)"
    ></app-expenses-new>
  }
  @case ("EDIT") {
    <app-expenses-edit></app-expenses-edit>
  }
  @case ("VIEW") {
    <app-expenses-view></app-expenses-view>
  }
  @default {
    <app-expenses-list></app-expenses-list>
  }
}

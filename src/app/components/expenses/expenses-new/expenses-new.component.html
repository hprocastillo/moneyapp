<h5>Nuevo Gasto</h5>
<hr class="text-muted">

<form [formGroup]="expenseForm" (ngSubmit)="submit()">

  <!-- DESCRIPTION -->
  <div class="form-floating mb-3">
    <input
      type="text"
      class="form-control"
      id="expenseDescription"
      placeholder="Descripción"
      formControlName="description"
    >
    <label for="expenseDescription">Descripción</label>
  </div>

  <!-- AMOUNT -->
  <div class="form-floating mb-3">
    <input
      type="number"
      class="form-control"
      id="expenseAmount"
      placeholder="Monto"
      formControlName="amount"
    >
    <label for="expenseAmount">Monto</label>
  </div>

  <!-- PAYMENT METHOD -->
  <div class="form-floating mb-3">
    <select class="form-select" id="expensePayment" formControlName="paymentMethod">
      <option selected>Seleccionar</option>
      <option value="EFECTIVO">EFECTIVO</option>
      <option value="TRANSFERENCIA">TRANSFERENCIA</option>
      <option value="TARJETA">TARJETA</option>
      <option value="YAPE">YAPE</option>
    </select>
    <label for="expensePayment">Metodo de pago</label>
  </div>

  <!-- RECEIPT PHOTO -->
  <div class="mb-3">
    <!-- INPUT FILE -->
    <input
      type="file"
      accept="image/*"
      capture="environment"
      hidden
      #fileInput
      (change)="onFileSelected($event)"
    />
    <button type="button" (click)="fileInput.click()">
      <i class="fa-solid fa-camera"></i> Tomar Foto
    </button>

    <!-- PREVIEW -->
    <div *ngIf="imagePreviewUrl" class="preview">
      <img [src]="imagePreviewUrl" alt="Foto recibo" width="120"/>
    </div>
  </div>


  <div class="row fixed-bottom p-3">
    <div class="col-12 d-flex justify-content-between">
      <button type="reset" class="btn btn-danger rounded-circle p-3" (click)="cancel()">
        <i class="fa-solid fa-xmark fa-2xl"></i>
      </button>

      <button type="submit" class="btn btn-success rounded-circle p-3">
        <i class="fa-solid fa-floppy-disk fa-2xl"></i>
      </button>
    </div>
  </div>
</form>

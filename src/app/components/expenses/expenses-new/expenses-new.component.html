<h5>Nuevo Gasto</h5>
<hr class="text-muted">

<form [formGroup]="expenseForm" (ngSubmit)="submit()">

  <div class="form-floating mb-3">
    <input
      type="text"
      class="form-control"
      id="expenseDescription"
      placeholder="Descripción"
      formControlName="description"
    >
    <label for="expenseDescription">Descripción</label>
  </div>

  <div class="form-floating mb-3">
    <input
      type="number"
      class="form-control"
      id="expenseAmount"
      placeholder="Monto"
      formControlName="amount"
    >
    <label for="expenseAmount">Monto</label>
  </div>

  <div class="form-floating">
    <select class="form-select" id="expensePayment" aria-label="Floating label select example">
      <option selected>Seleccionar</option>
      <option value="EFECTIVO">EFECTIVO</option>
      <option value="TRANSFERENCIA">TRANSFERENCIA</option>
      <option value="TARJETA">TARJETA</option>
      <option value="YAPE">YAPE</option>
    </select>
    <label for="expensePayment">Metodo de pago</label>
  </div>


  <input formControlName="receiptUrl" placeholder="URL del comprobante"/>
  <select formControlName="paymentMethod">
    <option value="EFECTIVO">Efectivo</option>
    <option value="TARJETA">Tarjeta</option>
    <option value="YAPE">Yape</option>
  </select>
  <button type="submit">Guardar</button>
</form>


<div class="row fixed-bottom p-3">
  <div class="col-12 d-flex justify-content-between">
    <app-btn-cancel></app-btn-cancel>
    <app-btn-save></app-btn-save>
  </div>
</div>
